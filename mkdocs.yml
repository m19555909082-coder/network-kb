site_name: 计算机网络知识点总结
site_description: Computer Networks Knowledge Base - Bilingual (Chinese/English)
site_author: 计算机网络课程
copyright: Copyright &copy; 2025 计算机网络课程

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: 暗色模式
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 亮色模式

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 4

plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\-_.,:;!?()\[\]{}]+'

extra_css:
  - stylesheets/extra.css

